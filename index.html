<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>40 Hari Kemudian</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #000;
    }

    /* ── Gambar frame ── */
    .frame {
      position: absolute;
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      transition: opacity 3s ease-in-out;
    }
    #img1 { opacity: 1; z-index: 1; }
    #img2 { opacity: 0; z-index: 2; }
    #img3 { opacity: 0; z-index: 3; }

    /* ── Tombol ── */
    #tombol {
      position: absolute;
      bottom: 40px;
      left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      background: rgba(150, 220, 240, 0.85);
      border: 2.5px solid #111;
      border-radius: 50px;
      padding: 12px 36px;
      font-size: 1.1rem;
      font-weight: 700;
      color: #111;
      cursor: pointer;
      letter-spacing: 0.03em;
      backdrop-filter: blur(6px);
      white-space: nowrap;
      animation: denyut 1.2s ease-in-out infinite;
      overflow: hidden;
    }

    @keyframes denyut {
      0%   { transform: translateX(-50%) scale(1);    box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
      14%  { transform: translateX(-50%) scale(1.08); box-shadow: 0 8px 28px rgba(100,200,255,0.5); }
      28%  { transform: translateX(-50%) scale(1);    box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
      42%  { transform: translateX(-50%) scale(1.05); box-shadow: 0 6px 22px rgba(100,200,255,0.35); }
      70%  { transform: translateX(-50%) scale(1);    box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
      100% { transform: translateX(-50%) scale(1);    box-shadow: 0 4px 16px rgba(0,0,0,0.15); }
    }

    /* ── Ripple ── */
    .ripple {
      position: absolute;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.55);
      transform: scale(0);
      animation: ripple-anim 0.7s linear;
      pointer-events: none;
    }
    @keyframes ripple-anim {
      to { transform: scale(4); opacity: 0; }
    }

    /* ── Glow overlay ── */
    #glow-overlay {
      position: absolute;
      inset: 0;
      z-index: 9;
      background: radial-gradient(circle at 50% 60%, rgba(255,240,150,0.45) 0%, transparent 70%);
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.5s ease;
    }
    #glow-overlay.aktif { opacity: 1; }

    /* ── Canvas ── */
    #canvas {
      position: absolute;
      inset: 0;
      z-index: 8;
      pointer-events: none;
    }
  </style>
</head>
<body>

  <img id="img1" class="frame" src="1.jpg" alt="frame 1">
  <img id="img2" class="frame" src="2.jpg" alt="frame 2">
  <img id="img3" class="frame" src="3.jpg" alt="frame 3">

  <div id="glow-overlay"></div>
  <canvas id="canvas"></canvas>

  <button id="tombol" onclick="mulaiAnimasi(event)">40 Hari Kemudian</button>

  <script>
    // ── Canvas setup ──
    const canvas = document.getElementById('canvas');
    const c      = canvas.getContext('2d');
    canvas.width  = window.innerWidth;
    canvas.height = window.innerHeight;

    let partikel     = [];
    let merpati      = [];
    let animBerjalan = false;

    function buatPartikel(jumlah) {
      for (let i = 0; i < jumlah; i++) {
        partikel.push({
          x:     Math.random() * canvas.width,
          y:     canvas.height * (0.2 + Math.random() * 0.7),
          r:     Math.random() * 3 + 1,
          vx:    (Math.random() - 0.5) * 1.4,
          vy:    -(Math.random() * 2.8 + 0.6),
          alpha: Math.random() * 0.8 + 0.2,
          warna: `hsl(${40 + Math.random()*40}, 100%, ${72 + Math.random()*22}%)`
        });
      }
    }

    function buatMerpati() {
      for (let i = 0; i < 7; i++) {
        setTimeout(() => {
          merpati.push({
            x:       Math.random() * canvas.width * 0.8 + canvas.width * 0.1,
            y:       canvas.height * (0.45 + Math.random() * 0.35),
            vx:      (Math.random() - 0.5) * 1.6,
            vy:      -(Math.random() * 2.2 + 0.8),
            size:    Math.random() * 10 + 14,
            alpha:   1,
            sayap:   0,
            sayapDir:1
          });
        }, i * 550);
      }
    }

    function gambarCanvas() {
      if (!animBerjalan) return;
      c.clearRect(0, 0, canvas.width, canvas.height);

      // Partikel cahaya
      for (let i = partikel.length - 1; i >= 0; i--) {
        const p = partikel[i];
        p.x += p.vx;
        p.y += p.vy;
        p.alpha -= 0.004;
        if (p.alpha <= 0) { partikel.splice(i, 1); continue; }
        c.save();
        c.globalAlpha = p.alpha;
        c.fillStyle   = p.warna;
        c.shadowColor = p.warna;
        c.shadowBlur  = 10;
        c.beginPath();
        c.arc(p.x, p.y, p.r, 0, Math.PI * 2);
        c.fill();
        c.restore();
      }

      // Merpati
      for (let i = merpati.length - 1; i >= 0; i--) {
        const m = merpati[i];
        m.x += m.vx;
        m.y += m.vy;
        m.alpha   -= 0.003;
        m.sayap   += 0.14 * m.sayapDir;
        if (m.sayap > 0.3 || m.sayap < -0.3) m.sayapDir *= -1;
        if (m.alpha <= 0) { merpati.splice(i, 1); continue; }
        c.save();
        c.globalAlpha = m.alpha;
        c.font        = m.size + 'px serif';
        c.textAlign   = 'center';
        c.translate(m.x, m.y);
        c.scale(1, 1 + m.sayap);
        c.fillText('🕊️', 0, 0);
        c.restore();
      }

      // Spawn partikel terus menerus
      if (Math.random() < 0.45) {
        partikel.push({
          x:     canvas.width * (0.15 + Math.random() * 0.7),
          y:     canvas.height * (0.3 + Math.random() * 0.55),
          r:     Math.random() * 2.5 + 0.6,
          vx:    (Math.random() - 0.5) * 1,
          vy:    -(Math.random() * 2 + 0.4),
          alpha: Math.random() * 0.6 + 0.2,
          warna: `hsl(${38 + Math.random()*45}, 100%, ${68 + Math.random()*28}%)`
        });
      }

      requestAnimationFrame(gambarCanvas);
    }

    // ── Suara lonceng ──
    function suaraLonceng(audioCtx) {
      [523, 659, 784].forEach((f, i) => {
        setTimeout(() => {
          // Nada utama
          const osc  = audioCtx.createOscillator();
          const gain = audioCtx.createGain();
          osc.type = 'sine';
          osc.frequency.value = f;
          gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
          gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 2.5);
          osc.connect(gain); gain.connect(audioCtx.destination);
          osc.start(); osc.stop(audioCtx.currentTime + 2.6);

          // Overtone lonceng
          const osc2  = audioCtx.createOscillator();
          const gain2 = audioCtx.createGain();
          osc2.type = 'sine';
          osc2.frequency.value = f * 2.756;
          gain2.gain.setValueAtTime(0.15, audioCtx.currentTime);
          gain2.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 1.4);
          osc2.connect(gain2); gain2.connect(audioCtx.destination);
          osc2.start(); osc2.stop(audioCtx.currentTime + 1.5);
        }, i * 420);
      });
    }

    // ── Suara choir (makin keras) ──
    function suaraChoir(audioCtx, mulai, vol) {
      const nada = [261.6, 329.6, 392.0, 493.9, 523.2, 659.3];
      nada.forEach((freq, i) => {
        const osc     = audioCtx.createOscillator();
        const gain    = audioCtx.createGain();
        const vibrato = audioCtx.createOscillator();
        const vibGain = audioCtx.createGain();

        vibrato.frequency.value = 5.2;
        vibGain.gain.value      = 3.5;
        vibrato.connect(vibGain);
        vibGain.connect(osc.frequency);

        osc.type = 'sine';
        osc.frequency.value = freq;

        gain.gain.setValueAtTime(0, audioCtx.currentTime + mulai);
        gain.gain.linearRampToValueAtTime(vol * 0.55, audioCtx.currentTime + mulai + 1.3 + i * 0.22);
        gain.gain.linearRampToValueAtTime(vol,         audioCtx.currentTime + mulai + 5);
        gain.gain.linearRampToValueAtTime(0,            audioCtx.currentTime + mulai + 9);

        osc.connect(gain); gain.connect(audioCtx.destination);
        vibrato.start(audioCtx.currentTime + mulai);
        osc.start(audioCtx.currentTime + mulai + i * 0.18);
        osc.stop(audioCtx.currentTime + mulai + 10);
        vibrato.stop(audioCtx.currentTime + mulai + 10);
      });

      // Napas choir
      const buf  = audioCtx.createBuffer(1, audioCtx.sampleRate * 9, audioCtx.sampleRate);
      const data = buf.getChannelData(0);
      for (let j = 0; j < data.length; j++) data[j] = (Math.random() * 2 - 1) * 0.025;
      const noise  = audioCtx.createBufferSource();
      noise.buffer = buf;
      const nGain  = audioCtx.createGain();
      const filter = audioCtx.createBiquadFilter();
      filter.type  = 'bandpass';
      filter.frequency.value = 900;
      filter.Q.value = 0.4;
      nGain.gain.setValueAtTime(0, audioCtx.currentTime + mulai);
      nGain.gain.linearRampToValueAtTime(vol * 0.18, audioCtx.currentTime + mulai + 2);
      nGain.gain.linearRampToValueAtTime(0,           audioCtx.currentTime + mulai + 9);
      noise.connect(filter); filter.connect(nGain); nGain.connect(audioCtx.destination);
      noise.start(audioCtx.currentTime + mulai);
    }

    // ── Ripple ──
    function buatRipple(e, btn) {
      const rect   = btn.getBoundingClientRect();
      const x      = e.clientX - rect.left;
      const y      = e.clientY - rect.top;
      const circle = document.createElement('span');
      const size   = Math.max(rect.width, rect.height);
      circle.classList.add('ripple');
      circle.style.width  = size + 'px';
      circle.style.height = size + 'px';
      circle.style.left   = (x - size / 2) + 'px';
      circle.style.top    = (y - size / 2) + 'px';
      btn.appendChild(circle);
      setTimeout(() => circle.remove(), 700);
    }

    // ── MAIN ──
    function mulaiAnimasi(e) {
      const tombol = document.getElementById('tombol');
      const img2   = document.getElementById('img2');
      const img3   = document.getElementById('img3');
      const glow   = document.getElementById('glow-overlay');

      // Ripple
      buatRipple(e, tombol);

      // Getar HP
      if (navigator.vibrate) navigator.vibrate([80, 40, 80]);

      // Audio
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      suaraLonceng(audioCtx);
      suaraChoir(audioCtx, 1.3, 0.11);  // choir lembut saat mulai
      suaraChoir(audioCtx, 4.2, 0.21);  // choir makin keras saat Yesus makin tinggi

      // Glow
      setTimeout(() => glow.classList.add('aktif'), 300);

      // Sembunyikan tombol
      setTimeout(() => {
        tombol.style.animation = 'none';
        tombol.style.display   = 'none';
      }, 400);

      // Partikel & merpati
      animBerjalan = true;
      buatPartikel(60);
      setTimeout(buatMerpati, 700);
      gambarCanvas();

      // Frame 1 → 2
      setTimeout(() => { img2.style.opacity = '1'; }, 500);

      // Frame 2 → 3
      setTimeout(() => { img3.style.opacity = '1'; }, 4000);

      // Ledakan partikel + merpati saat frame 3
      setTimeout(() => {
        buatPartikel(50);
        buatMerpati();
      }, 4300);

      // Stop canvas
      setTimeout(() => { animBerjalan = false; }, 14000);
    }
  </script>

</body>
</html>
